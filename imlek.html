<!DOCTYPE html>
<html>

<head>
    <title>Perayaan Imlek</title>

    <style>
        body {
            background: #b30000;
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
            color: gold;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 55px;
        }

        .lampion {
            width: 100px;
            height: 100px;
            background: red;
            border-radius: 50%;
            border: 6px solid gold;
            display: inline-block;
            margin: 20px;
        }

        .ucapan {
            background: #8b0000;
            width: 60%;
            margin: 40px auto;
            padding: 20px;
            border-radius: 10px;
            font-size: 22px;
        }

        .footer {
            margin-top: 30px;
            font-size: 18px;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="lampion"></div>
        <div class="lampion"></div>

        <h1>🧧 Gong Xi Fa Cai 🧧</h1>

        <div class="ucapan">
            Selamat Tahun Baru Imlek!
            Hari ini kita merayakan Imlek dengan penuh kebahagiaan
            karena bubub gua cina 🧧
        </div>

        <div class="footer">
            Semoga tahun ini membawa rezeki, kesehatan, dan kebahagiaan untuk kita semua.
        </div>

        <div class="lampion"></div>
        <div class="lampion"></div>

    </div>

</body>

</html>
