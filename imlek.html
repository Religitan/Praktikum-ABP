<!DOCTYPE html>
<html>

<head>
    <title>Perayaan Imlek</title>

    <style>
        body {
            background: red;
            text-align: center;
            font-family: Arial;
            color: gold;
        }

        .container {
            margin-top: 150px;
        }

        h1 {
            font-size: 60px;
        }

        h2 {
            font-size: 28px;
        }

        .lampion {
            width: 120px;
            height: 120px;
            background: gold;
            border-radius: 50%;
            margin: 20px auto;
            animation: goyang 2s infinite;
        }

        @keyframes goyang {
            0% {
                transform: rotate(-10deg);
            }

            50% {
                transform: rotate(10deg);
            }

            100% {
                transform: rotate(-10deg);
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="lampion"></div>

        <h1>Gong Xi Fa Cai</h1>

        <h2>Karena bubub gua cina 🧧</h2>

        <p>Selamat Tahun Baru Imlek</p>

    </div>

</body>

</html>
